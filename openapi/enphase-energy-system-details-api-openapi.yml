      description: This endpoint is used to retrieve the list of all available event_types. The endpoint will return list of event_type_id along with the event_description and recommended_action. If an event_type_id is passed, this endpoint will return the detail of specific event_type
      operationId: listEventTypes
      tags:
      - System Details
      parameters:
      - name: event_type_id
        in: query
        description: The unique numeric ID of the event type.
        schema:
          type: integer
      responses:
        '200':
          description: The list of event_types
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_types:
                    type: array
                    description: List of event types
                    items:
                      type: object
                      properties:
                        event_type_id:
                          type: integer
                          description: Unique identifier of the event type.
                        event_type_key:
                          type: string
                          description: Slug that identifies the event type.
                        stateful:
                          type: boolean
                          description: Event state (true = stateful, false = transient)
                        event_name:
                          type: string
                          description: Name of the event
                        event_description:
                          type: string
                          description: Description of the event
                        recommended_action:
                          type: string
