  /api/v4/systems/inverters_summary_by_envoy_or_site:
    get:
      summary: inverters_summary_by_envoy_or_site
      description: Returns the microinverters summary based on the specified active envoy serial number or system.
      operationId: getInvertersSummary
      tags:
      - System Details
      parameters:
      - name: site_id
        in: query
        description: Site id. The response will contain only those microinverters reporting to one of the active envoys of the given site.
        schema:
          type: integer
      - name: envoy_serial_number
        in: query
        description: Envoy Serial Number. Only microinverters reporting to the given envoy will be present in the response.
        schema:
          type: integer
      - name: page
        in: query
        description: The page to be returned. Default=1, Min=1. For example, if page is set to 2, 2nd page is returned
        schema:
          type: integer
      - name: size
        in: query
        description: Maximum number of records shown per page. Default=10, Min=1, Max=100.  For example, if max is set to 5, 5 records are shown per page
        schema:
          type: integer
      responses:
        '200':
          description: inverters_summary_by_envoy_or_site
          content:
            application/json:
              schema:
                type: array
                items:
                  properties:
                    signal_strength:
                      type: integer
                      description: Signal Strength
                    micro_inverters:
                      type: array
                      items:
                        properties:
                          id:
                            type: integer
                            description: Numeric id of the microinverter
