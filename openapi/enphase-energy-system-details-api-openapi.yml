  /api/v4/systems/{system_id}/summary:
    get:
      summary: Retrieves a system summary
      description: Returns system summary based on the specified system ID.
      operationId: getSystemSummary
      tags:
      - System Details
      parameters:
      - name: system_id
        in: path
        description: The unique numeric ID of the system
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: System summary fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  system_id:
                    type: integer
                    description: The unique numeric ID of the system
                  current_power:
                    type: integer
                    description: Current power production of the system in Watts
                  energy_lifetime:
                    type: integer
                    description: Energy generated by the system during its lifetime in Wh
                  energy_today:
                    type: integer
                    description: Energy generated by the system today in Wh
                  last_interval_end_at:
                    type: integer
                    description: The last known time that the system produced energy. When a system has not been communicating for a length of time, the last_report_at can be recent, whereas the last_interval_end_at may be further back.
                  last_report_at:
                    type: integer
                    description: Timestamp (in epoch format) at which the system's Envoy last submitted a report
                  modules:
                    type: integer
                    description: Total number of modules in the system
                  operational_at:
                    type: integer
                    nullable: true
                    description: Timestamp (in epoch format) at which this system became operational. Corresponds to the system’s interconnect time, if one is specified. Otherwise, it is the system’s first reported interval end time.
                  size_w:
                    type: integer
                    description: System size in watts
                  nmi:
                    type: string
                    description: National Meter Identifier
                  source:
                    type: string
                    description: Source of energy measurement
                  status:
                    type: string
                    description: Current status of the system
                  summary_date:
                    type: string
                    description: Summary date
                  battery_charge_w:
                    type: integer
                    description: Maximum charge power of all the batteries of the system in watts
                  battery_discharge_w:
                    type: integer
                    description: Maximum discharge power of all the batteries of the system in watts
                  battery_capacity_wh:
                    type: integer
                    description: Total capacity of all the batteries of the system in watt-hours
              examples:
                response:
                  value:
                    system_id: 698910067
