  /api/v4/systems/{system_id}/latest_telemetry:
    get:
      summary: Returns a system's last reported PV Power, Consumption Power, and Battery Power in Watts.
      description: Returns a system's last reported PV Power, Consumption Power, and Battery Power in Watts. If the last_report_at is older than 7 days for a specific device, “last_report_at”, “power” and “operational_mode” parameters will be returned in the response with the value as null.
      operationId: getLatestSystemTelemetry
      tags:
      - Site Level Consumption Monitoring
      parameters:
      - name: system_id
        in: path
        description: The unique numeric ID of the system
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: List of devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  system_id:
                    type: integer
                    description: System id
                  items:
                    type: string
                    description: The list key 'devices'
                  devices:
                    type: object
                    description: Hash keys include meters, and Encharges
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            description: Device ID
                          name:
                            type: string
                            description: Device Name
                          channel:
                            type: integer
                            description: The reporting channel ID (applicable only in case of meters)
                          last_report_at:
                            type: integer
                            nullable: true
                            description: Timestamp at which the device last reported
                          power:
                            type: integer
                            nullable: true
                            description: Power reading at the last reported time
                          operational_mode:
                            type: string
                            description: Battery mode. Possible values are Idle, Charging, Discharging
              examples:
                response:
                  value:
                    system_id: 698943141
                    items: devices
                    devices:
                      meters:
                      - id: 1084690247
                        name: production
                        channel: 1
                        last_report_at: 1701418500
                        power: 755
                      - id: 1084690247
                        name: production
                        channel: 2
                        last_report_at: null
                        power: null
                      - id: 1084690247
                        name: production
                        channel: 3
                        last_report_at: null
                        power: null
                      - id: 1084690248
                        name: consumption
                        channel: 1
                        last_report_at: 1701418500
                        power: 12
                      - id: 1084690248
                        name: consumption
                        channel: 2
                        last_report_at: null
                        power: null
                      - id: 1084690248
                        name: consumption
                        channel: 3
                        last_report_at: null
                        power: null
                      encharges:
                      - id: 1084690255
                        name: Encharge 492205005191
                        channel: 1
                        last_report_at: 1701087429
                        power: -15
                        operational_mode: Idle
                      - id: 1084690258
                        name: Encharge 492217007127
                        channel: 1
                        last_report_at: 1701418467
                        power: 0
                        operational_mode: Idle
