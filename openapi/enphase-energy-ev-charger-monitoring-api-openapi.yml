      required:
      - charge_time
      - cost
      - duration
      - end_time
      - energy_added
      - miles_added
      - start_time
      type: object
      properties:
        start_time:
          type: integer
          description: session start time
          format: int64
          example: 1700059683
        end_time:
          type: integer
          description: session end time
          format: int64
          example: 1700071180
        duration:
          type: integer
          description: session duration in seconds
          format: int64
          example: 11497
        energy_added:
          type: number
          description: energy added in Wh
          format: double
          example: 14.83
        charge_time:
          type: integer
          description: Total charging time
          format: int64
          example: 7080
        miles_added:
          type: number
          description: Miles added
          format: double
          example: 1.2
        cost:
          type: number
          description: session cost
          example: 0.5
      description: List of sessions
