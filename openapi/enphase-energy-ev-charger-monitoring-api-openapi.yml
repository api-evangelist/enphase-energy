    ChargeSessionDetailsResponse:
      required:
      - count
      - sessions
      - system_id
      type: object
      properties:
        count:
          type: integer
          description: Count of sessions
          format: int32
          example: 1
        system_id:
          type: integer
          description: system_id
          format: int32
          example: 698989834
        sessions:
          type: array
          description: List of sessions
          items:
            $ref: '#/components/schemas/ChargeSessionDetail'
    ErrorResponseArray:
      required:
      - message
      - reason
      type: object
      properties:
        message:
          type: array
          description: message
          example:
          - Method not allowed
          items:
            type: string
            description: message
            example: '["Method not allowed"]'
        reason:
          type: string
          description: statusCode
          example: '405'
    Schedule:
      type: object
      properties:
        days:
          type: array
          items:
            type: integer
            format: int32
        start_time:
          type: string
        end_time:
          type: string
        charging_level:
          type: integer
          format: int32
      example:
      - days:
        - 1
        - 2
        start_time: 60
        end_time: 120
        charging_level: 70
      - days:
        - 3
        - 4
        - 5
        - 6
        - 7
        start_time: 120
        end_time: 180
        charging_level: 80
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
        details:
          type: string
          description: Additional error detail.
