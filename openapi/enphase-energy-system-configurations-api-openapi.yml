  /api/v4/systems/config/{system_id}/load_control:
    get:
      summary: Returns the current load control settings of a system
      description: Returns the current load control settings of a system
      operationId: getSystemLoadControl
      parameters:
      - name: system_id
        in: path
        description: The unique numeric id of the system
        required: true
        schema:
          type: string
      tags:
      - System Configurations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  system_id:
                    type: integer
                  load_control_data:
                    type: array
                    items:
                      properties:
                        name:
                          type: string
                          description: Name of the dry contact
                        load_name:
                          type: string
                          description: Name of the load
                        owner_can_override:
                          type: boolean
                          description: Indicates if the homeowner can override the load control settings
                        mode:
                          type: string
                          description: Current load control configuration
                        soc_low:
                          type: integer
                          description: Applicable for advanced mode. Load will be powered off when the battery soc reaches this level
                        soc_high:
                          type: integer
                          description: Applicable for advanced mode. Load powers off when battery reacheds soc_low. The load will be powered on when the battery soc reaches soc_high
                        status:
                          type: string
                          description: enabled/disabled
                        essential_start_time:
                          type: integer
                          description: Applicable for scheduled mode. Time in seconds. Load will powered on between essential_start_time and essential_end_time
                        essential_end_time:
                          type: integer
                          description: Applicable for scheduled mode. Time in seconds. Load will powered on between essential_start_time and essential_end_time
                    description: load control data for all the configured loads
