                  type: integer
                  description: Applicable for advanced mode. Load will be powered off when the battery soc reaches this level. It can be between 10 to 90
                essential_start_time:
                  type: integer
                  description: Applicable for scheduled mode. Time in seconds. Load will powered on between essential_start_time and essential_end_time
                essential_end_time:
                  type: integer
