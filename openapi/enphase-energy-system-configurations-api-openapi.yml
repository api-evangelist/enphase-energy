                  description: Name of the dry contact. Name cannot be changed. It is only used to identify the dry contact that needs to be updated.
                load_name:
                  type: string
                  description: Load Name of the load. Load Name cannot be changed. It is only used to identify the dry contact that needs to be updated.
                mode:
                  allOf:
                  - $ref: '#/components/schemas/LoadControlMode'
